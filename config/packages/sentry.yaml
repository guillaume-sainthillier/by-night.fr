when@prod:
    sentry:
        dsn: '%env(SENTRY_DSN)%'
        options:
            # Add request headers, cookies, IP address and the authenticated user
            # see https://docs.sentry.io/platforms/php/data-management/data-collected/ for more info
            send_default_pii: true
            #traces_sample_rate: 0.5
            release: 'v%env(APP_VERSION)%'
            ignore_exceptions:
                - 'Symfony\Component\ErrorHandler\Error\FatalError'
                - 'Symfony\Component\Debug\Exception\FatalErrorException'

        # If you are using Monolog, you also need this additional configuration to log the errors correctly:
        # https://docs.sentry.io/platforms/php/guides/symfony/integrations/monolog/
        register_error_listener: false
        register_error_handler: false

    monolog:
        handlers:
            # Forward ERROR-level Monolog records (incl. uncaught exceptions logged by Symfony) to Sentry as Issues.
            sentry:
                type: service
                id: Sentry\Monolog\Handler

    services:
        Sentry\Monolog\Handler:
            arguments:
                $hub: '@Sentry\State\HubInterface'
                $level: !php/const Monolog\Logger::ERROR
                $fillExtraContext: true # Enables sending monolog context to Sentry
