[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid

[program:messenger-parser]
priority=1
numprocs=1
; memory_limit is pinned just above --memory-limit so Messenger restarts the worker
; gracefully (between messages) before PHP would hard-fatal on an OOM.
command=php -d memory_limit=1280M /app/bin/console messenger:consume parser -vv --time-limit=3600 --memory-limit=1024M
user=root
process_name=%(program_name)s_%(process_num)02d
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:messenger-image]
priority=1
numprocs=2
command=php -d memory_limit=640M /app/bin/console messenger:consume image -vv --time-limit=3600 --memory-limit=512M
user=root
process_name=%(program_name)s_%(process_num)02d
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:messenger-elastica]
priority=1
numprocs=2
command=php -d memory_limit=320M /app/bin/console messenger:consume elastica -vv --time-limit=3600 --memory-limit=256M
user=root
process_name=%(program_name)s_%(process_num)02d
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:messenger-async]
priority=1
numprocs=2
command=php -d memory_limit=320M /app/bin/console messenger:consume async -vv --time-limit=3600 --memory-limit=256M
user=root
process_name=%(program_name)s_%(process_num)02d
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[supervisorctl]
serverurl=unix:///var/run/supervisord.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[unix_http_server]
file = /var/run/supervisor.sock
