name: Build And Deploy Release

on:
    push:
        tags:
            - v*

jobs:
    build:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        steps:
            - uses: actions/checkout@v6

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4

            - name: Extract version info
              id: version
              run: |
                  VERSION=$(echo ${GITHUB_REF} | sed -e "s/refs\/tags\///g" | sed -E "s/v?([0-9]+)\.([0-9]+)\.([0-9]+)(-[a-zA-Z]+(\.[0-9]+)?)?/\1.\2.\3\4/g")
                  MAJOR_MINOR=$(echo ${GITHUB_REF} | sed -e "s/refs\/tags\///g" | sed -E "s/v?([0-9]+)\.([0-9]+)\.([0-9]+)(-[a-zA-Z]+(\.[0-9]+)?)?/\1.\2\4/g")
                  MAJOR=$(echo ${GITHUB_REF} | sed -e "s/refs\/tags\///g" | sed -E "s/v?([0-9]+)\.([0-9]+)\.([0-9]+)(-[a-zA-Z]+(\.[0-9]+)?)?/\1\4/g")
                  echo "version=$VERSION" >> $GITHUB_OUTPUT
                  echo "tags=guystlr/by-night:stable,guystlr/by-night:$VERSION,guystlr/by-night:$MAJOR_MINOR,guystlr/by-night:$MAJOR" >> $GITHUB_OUTPUT

            - name: Login to Docker Hub
              uses: docker/login-action@v4
              with:
                  username: ${{ secrets.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_PASSWORD }}

            - name: Build and push
              uses: docker/build-push-action@v7
              with:
                  context: .
                  push: true
                  tags: ${{ steps.version.outputs.tags }}
                  build-args: APP_VERSION=${{ steps.version.outputs.version }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

    upload-assets:
        needs: build
        runs-on: ubuntu-latest
        container:
            image: guystlr/by-night:stable
            env:
                AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
                AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
                AWS_DEFAULT_REGION: eu-west-3
        steps:
            - name: Upload assets to S3
              run: |
                  set -ex;
                  apk add --no-cache aws-cli;
                  aws s3 sync /app/public/build s3://assets.by-night.fr/build --size-only;
                  aws s3 sync /app/public/bundles s3://assets.by-night.fr/bundles --size-only

    deploy:
        needs: build
        runs-on: ubuntu-latest
        steps:
            - name: Deploy to production
              uses: appleboy/ssh-action@v1
              env:
                  BY_NIGHT_PATH: ${{ secrets.BY_NIGHT_PATH }}
              with:
                  host: ${{ secrets.HOST }}
                  username: ${{ secrets.USERNAME }}
                  key: ${{ secrets.KEY }}
                  envs: BY_NIGHT_PATH
                  script: |
                      cd $BY_NIGHT_PATH
                      sudo /bin/bash ./deploy.sh
